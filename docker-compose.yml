services:
  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-doc-assistant-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-doc-assistant-backend
    ports:
      - "18888:8888"
    env_file:
      - .env.deploy
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ai_document_assistant
      - DATA_DIR=/app/data
    volumes:
      - backend-logs:/app/logs
      - ${HOME}/.ai-document-assistant/data:/app/data
    depends_on:
      chroma:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: ai-doc-assistant-postgres
    ports:
      - "15432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ai_document_assistant
    volumes:
      - ${HOME}/.ai-document-assistant/data/postgres:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d ai_document_assistant",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Chroma 向量数据库
  chroma:
    image: chromadb/chroma:latest
    container_name: ai-doc-assistant-chroma
    ports:
      - "18000:8000"
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - ${HOME}/.ai-document-assistant/data/chroma:/chroma/chroma
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  app-network:
    driver: bridge

volumes:
  backend-logs:
